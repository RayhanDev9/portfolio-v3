<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hire Mobile Devs Differently</title>

    <!-- CSS hasil build Tailwind CLI: npm run build -->
    <link rel="stylesheet" href="css/output.css" />
  </head>
  <body class="text-white antialiased bg-black overflow-x-hidden">
    <header>
      <nav
        class="hidden absolute left-1/2 top-7 z-30 lg:flex -translate-x-1/2 items-center gap-7 rounded-full border border-white/10 bg-white/5 px-3 py-2 text-sm text-white/80 backdrop-blur-md"
      >
        <span
          class="flex h-8 w-8 items-center justify-center rounded-full bg-white text-black"
        >
          <svg viewBox="0 0 24 24" class="h-4 w-4" fill="currentColor">
            <path
              d="M12 2C8 2 5 6 5 10.5 5 16 9 20 12 22c3-2 7-6 7-11.5C19 6 16 2 12 2z"
            />
          </svg>
        </span>
        <a href="#" class="transition hover:text-white">Services</a>
        <a href="#" class="transition hover:text-white">Approach</a>
        <a href="#" class="transition hover:text-white">Cases</a>
        <a href="#" class="transition hover:text-white">About</a>
        <button
          class="rounded-full bg-white px-5 py-2 font-medium text-black transition hover:bg-white/90"
        >
          Hire Talent
        </button>
      </nav>

      <nav class="flex lg:hidden items-center justify-between px-5 py-5">
        <div class="flex items-center gap-2 text-base font-semibold">
          <span
            class="flex h-6 w-6 items-center justify-center rounded-full bg-white text-black"
          >
            <svg viewBox="0 0 24 24" class="h-3.5 w-3.5" fill="currentColor">
              <path
                d="M12 2C8 2 5 6 5 10.5 5 16 9 20 12 22c3-2 7-6 7-11.5C19 6 16 2 12 2z"
              />
            </svg>
          </span>
          Blueprint.
        </div>
        <button class="lg:hidden text-sm text-white/70">Menu</button>
      </nav>
    </header>

    <main class="overflow-hidden">
      <div
        id="gridCursor"
        class="pointer-events-none absolute h-96 w-96 -translate-x-1/2 -translate-y-1/2 opacity-0 scale-0 transition-all duration-500 ease-out overflow-hidden [background-image:linear-gradient(rgba(255,255,255,0.15)_2px,transparent_2px),linear-gradient(90deg,rgba(255,255,255,0.15)_2px,transparent_2px)] [background-size:80px_80px] [mask-image:radial-gradient(circle,white_40%,transparent_80%)] [-webkit-mask-image:radial-gradient(circle,white_40%,transparent_80%)]"
      ></div>

      <section class="h-screen" id="home">
        <div class="h-[inherit] m-0 p-0">
          <div
            class="h-full w-[60%] mx-auto bg-amber-10 flex items-center justify-center"
          >
            <div class="content self-center">
              <h1
                class="text-4xl md:text-5xl lg:text-6xl font-bold mb-5 text-center"
              >
                Hire, Frontend Web Developer
              </h1>
              <p
                class="mt-6 text-base md:text-lg leading-relaxed opacity-80 text-center"
              >
                Lorem, ipsum dolor sit amet consectetur adipisicing elit. Porro
                quis quos inventore tenetu
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- <div
      class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.08)_2px,transparent_2px),linear-gradient(90deg,rgba(255,255,255,0.08)_2px,transparent_2px)] bg-[size:80px_80px] grid-pattern"
    ></div> -->

    <script src="js/script.js"></script>
  </body>
</html>
